name: Deploy React Vite Site

on:
  push:
    branches:
      - main # Déclenche le déploiement à chaque fois que vous modifiez la branche main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Ancienne version compatible ou cloud)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite génère les fichiers dans le dossier dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
